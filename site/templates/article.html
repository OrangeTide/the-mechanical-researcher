<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>{{TITLE}} — The Mechanical Researcher</title>
  <link rel="stylesheet" href="{{ROOT}}/static/css/article.css">
  <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=IBM+Plex+Sans:wght@400;600&family=IBM+Plex+Sans+Condensed:wght@400;600&family=IBM+Plex+Mono:wght@400&display=swap">
</head>
<body>
  <nav class="top-bar">
    <a href="{{ROOT}}/index.html" class="back-link">&larr; Back to desk</a>
  </nav>
  <article class="research-article">
    <header>
      <span class="article-category">{{CATEGORY}}</span>
      <h1>{{TITLE}}</h1>
      <div class="article-meta">
        <time datetime="{{DATE}}">{{DATE_DISPLAY}}</time>
        {{REVISED}}
        <a href="#" class="permalink" title="Copy permalink">&#x1f517;</a>
        {{SOURCE_ZIP}}
      </div>
    </header>
    <script>
      document.querySelector('.permalink').addEventListener('click', function(e) {
        e.preventDefault();
        var url = window.location.href.replace(/#.*$/, '');
        navigator.clipboard.writeText(url).then(function() {
          var el = e.target;
          el.textContent = '\u2713';
          el.classList.add('copied');
          setTimeout(function() {
            el.textContent = '\uD83D\uDD17';
            el.classList.remove('copied');
          }, 1500);
        });
      });
    </script>
    <div class="article-body">
      {{BODY}}
    </div>
  </article>
  {{TOC}}
  <footer class="bottom-bar">
    <span class="site-title">The Mechanical Researcher</span>
  </footer>
  <script>
    (function() {
      var toc = document.querySelector('.toc-list');
      var cb = document.getElementById('toc-toggle');
      if (toc && cb) toc.addEventListener('click', function(e) {
        var a = e.target.closest('a');
        if (!a) return;
        e.preventDefault();
        cb.checked = false;
        var target = document.querySelector(a.getAttribute('href'));
        if (target) target.scrollIntoView({ block: 'start' });
      });
    })();
  </script>
  <script>
    (function() {
      var body = document.querySelector('.article-body');
      if (!body) return;
      body.addEventListener('click', function(e) {
        var el = e.target;
        if (el.tagName !== 'IMG' && el.tagName !== 'svg' && !el.closest('svg')) return;
        if (el.closest('a') || el.closest('pre')) return;
        var src = el.closest('svg') || el;
        var overlay = document.createElement('div');
        overlay.className = 'img-lightbox';
        var close = document.createElement('button');
        close.className = 'close-btn';
        close.textContent = '\u00d7';
        var clone = src.cloneNode(true);
        clone.style.cssText = '';
        clone.removeAttribute('width');
        clone.removeAttribute('height');
        overlay.appendChild(clone);
        document.body.appendChild(close);
        document.body.appendChild(overlay);
        function dismiss() {
          overlay.remove();
          close.remove();
        }
        close.addEventListener('click', dismiss);
        overlay.addEventListener('click', function(ev) {
          if (ev.target === overlay) dismiss();
        });
        document.addEventListener('keydown', function esc(ev) {
          if (ev.key === 'Escape') { dismiss(); document.removeEventListener('keydown', esc); }
        });
      });
    })();
  </script>
</body>
</html>
