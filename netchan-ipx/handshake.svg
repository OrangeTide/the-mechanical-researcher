<polygon fill="white" points="408,79 551,79 551,88 408,88"/>
<text x="409" y="88" textLength="141" font-family="Helvetica" font-size="12" fill="black">
ACK  (conn_id = server id)
</text>
<line x1="240" y1="106" x2="240" y2="123" stroke="black"/>
<line x1="720" y1="106" x2="720" y2="123" stroke="black"/>
<line x1="120" y1="111" x2="840" y2="111" stroke="black" stroke-dasharray="2,2"/>
<polygon fill="white" points="338,107 620,107 620,116 338,116"/>
<text x="339" y="116" textLength="280" font-family="Helvetica" font-size="12" fill="black">
connected; client locks onto server's unicast address
</text>
