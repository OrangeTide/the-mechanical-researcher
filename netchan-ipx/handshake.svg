<polygon fill="white" points="351,197 607,197 607,206 351,206"/>
<text x="352" y="206" textLength="254" font-family="Helvetica" font-size="12" fill="black">
INPUT  (8-dir + fire), each tick   [unreliable ch 1]
</text>
<line x1="240" y1="224" x2="240" y2="252" stroke="black"/>
<line x1="720" y1="224" x2="720" y2="252" stroke="black"/>
