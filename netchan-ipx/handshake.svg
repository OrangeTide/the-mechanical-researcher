<text x="359" y="161" textLength="240" font-family="Helvetica" font-size="12" fill="black">
MAP chunk x N  -&gt;  MAPEND   [reliable ch 0]
</text>
<line x1="240" y1="179" x2="240" y2="196" stroke="black"/>
<line x1="720" y1="179" x2="720" y2="196" stroke="black"/>
<line x1="240" y1="196" x2="240" y2="224" stroke="black"/>
<line x1="720" y1="196" x2="720" y2="224" stroke="black"/>
<line x1="240" y1="207" x2="720" y2="207" stroke="black"/>
