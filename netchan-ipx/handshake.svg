STATE  (players, creatures, shots), 8 Hz   [unreliable ch 1]
</text>
<line x1="240" y1="252" x2="240" y2="280" stroke="black"/>
<line x1="720" y1="252" x2="720" y2="280" stroke="black"/>
<line x1="240" y1="263" x2="720" y2="263" stroke="black"/>
<polygon fill="black" points="720,263 710,269 710,257"/>
<polygon fill="white" points="383,253 575,253 575,262 383,262"/>
<text x="384" y="262" textLength="190" font-family="Helvetica" font-size="12" fill="black">
CHAT  (a typed line)   [reliable ch 0]
</text>
<line x1="240" y1="274" x2="240" y2="280" stroke="black"/>
<line x1="720" y1="274" x2="720" y2="280" stroke="black"/>
</svg>
