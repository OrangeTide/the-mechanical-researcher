<text x="342" y="133" textLength="274" font-family="Helvetica" font-size="12" fill="black">
WELCOME  (assigned player index)   [reliable ch 0]
</text>
<line x1="240" y1="151" x2="240" y2="179" stroke="black"/>
<line x1="720" y1="151" x2="720" y2="179" stroke="black"/>
