SYN-ACK  (conn_id = client id, carries server id)
</text>
<line x1="240" y1="78" x2="240" y2="106" stroke="black"/>
<line x1="720" y1="78" x2="720" y2="106" stroke="black"/>
<line x1="240" y1="89" x2="720" y2="89" stroke="black"/>
