<text x="346" y="32" textLength="267" font-family="Helvetica" font-size="12" fill="black">
SYN  (broadcast node, conn_id 0, carries client id)
</text>
<line x1="240" y1="50" x2="240" y2="78" stroke="black"/>
<line x1="720" y1="50" x2="720" y2="78" stroke="black"/>
