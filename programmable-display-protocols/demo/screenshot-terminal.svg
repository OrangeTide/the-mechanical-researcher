<svg xmlns="http://www.w3.org/2000/svg" width="720" height="386">
  <style>
    text { font-family: ui-monospace, 'SF Mono', 'Cascadia Code', Menlo, Consolas, monospace; font-size: 13px; white-space: pre; }
    .bg { fill: #1e1e2e; }
    .titlebar { fill: #313244; }
    .title { fill: #cdd6f4; }
    .t { fill: #cdd6f4; }
    .bold { fill: #cdd6f4; font-weight: bold; }
    .red { fill: #f38ba8; }
    .red-bold { fill: #f38ba8; font-weight: bold; }
    .green { fill: #a6e3a1; }
    .green-bold { fill: #a6e3a1; font-weight: bold; }
    .yellow { fill: #f9e2af; }
    .yellow-bold { fill: #f9e2af; font-weight: bold; }
    .blue { fill: #89b4fa; }
    .blue-bold { fill: #89b4fa; font-weight: bold; }
    .magenta { fill: #cba6f7; }
    .magenta-bold { fill: #cba6f7; font-weight: bold; }
    .cyan { fill: #94e2d5; }
    .cyan-bold { fill: #94e2d5; font-weight: bold; }
  </style>
  <rect class="bg" width="720" height="386" rx="8"/>
  <rect class="titlebar" width="720" height="32" rx="8"/>
  <rect class="bg" x="0" y="24" width="720" height="8"/>
  <circle cx="20" cy="16" r="6" fill="#f38ba8"/>
  <circle cx="40" cy="16" r="6" fill="#f9e2af"/>
  <circle cx="60" cy="16" r="6" fill="#a6e3a1"/>
  <text class="title" x="360" y="20" text-anchor="middle">Terminal</text>
  <text y="56" x="16"><tspan class="t">$ make</tspan></text>
  <text y="78" x="16"><tspan class="t">cc -Wall -Wextra -O2 -std=c99 -o quaoar-server quaoar-server.c</tspan></text>
  <text y="100" x="16"><tspan class="t">cc -Wall -Wextra -O2 -std=c99 -o notepad notepad.c libquaoar.a</tspan></text>
  <text y="122" x="16"><tspan class="t">cc -Wall -Wextra -O2 -std=c99 -o clock clock.c libquaoar.a</tspan></text>
  <text y="144" x="16"></text>
  <text y="166" x="16"><tspan class="t">$ ./quaoar-server &amp;</tspan></text>
  <text y="188" x="16"><tspan class="t">[1] 4821</tspan></text>
  <text y="210" x="16"><tspan class="t">quaoar-server: listening on ws://127.0.0.1:9090</tspan></text>
  <text y="232" x="16"><tspan class="t">quaoar-server: socket /tmp/quaoar-0</tspan></text>
  <text y="254" x="16"></text>
  <text y="276" x="16"><tspan class="t">$ ./notepad &amp;</tspan></text>
  <text y="298" x="16"><tspan class="t">[2] 4822</tspan></text>
  <text y="320" x="16"></text>
  <text y="342" x="16"><tspan class="t">$ ./clock &amp;</tspan></text>
  <text y="364" x="16"><tspan class="t">[3] 4823</tspan></text>
</svg>
