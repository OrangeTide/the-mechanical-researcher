<svg xmlns="http://www.w3.org/2000/svg" width="720" height="452">
  <style>
    text { font-family: ui-monospace, 'SF Mono', 'Cascadia Code', Menlo, Consolas, monospace; font-size: 13px; white-space: pre; }
    .bg { fill: #1e1e2e; }
    .titlebar { fill: #313244; }
    .title { fill: #cdd6f4; }
    .t { fill: #cdd6f4; }
    .bold { fill: #cdd6f4; font-weight: bold; }
    .red { fill: #f38ba8; }
    .red-bold { fill: #f38ba8; font-weight: bold; }
    .green { fill: #a6e3a1; }
    .green-bold { fill: #a6e3a1; font-weight: bold; }
    .yellow { fill: #f9e2af; }
    .yellow-bold { fill: #f9e2af; font-weight: bold; }
    .blue { fill: #89b4fa; }
    .blue-bold { fill: #89b4fa; font-weight: bold; }
    .magenta { fill: #cba6f7; }
    .magenta-bold { fill: #cba6f7; font-weight: bold; }
    .cyan { fill: #94e2d5; }
    .cyan-bold { fill: #94e2d5; font-weight: bold; }
  </style>
  <rect class="bg" width="720" height="452" rx="8"/>
  <rect class="titlebar" width="720" height="32" rx="8"/>
  <rect class="bg" x="0" y="24" width="720" height="8"/>
  <circle cx="20" cy="16" r="6" fill="#f38ba8"/>
  <circle cx="40" cy="16" r="6" fill="#f9e2af"/>
  <circle cx="60" cy="16" r="6" fill="#a6e3a1"/>
  <text class="title" x="80" y="20">netchan-crypto: encrypted echo over UDP</text>
  <text y="56" x="16"><tspan class="green-bold">$ </tspan><tspan class="t">make</tspan></text>
  <text y="78" x="16"><tspan class="t">  CC       secure_link.c</tspan></text>
  <text y="100" x="16"><tspan class="t">  CC       nc_crypto.c</tspan></text>
  <text y="122" x="16"><tspan class="t">  LD       _out/x86_64-linux-gnu/bin/echo_server</tspan></text>
  <text y="144" x="16"><tspan class="t">  LD       _out/x86_64-linux-gnu/bin/echo_client</tspan></text>
  <text y="166" x="16"></text>
  <text y="188" x="16"><tspan class="green-bold">$ </tspan><tspan class="t">./echo_server 9000 --psk lan-party </tspan><tspan class="yellow">&amp;</tspan></text>
  <text y="210" x="16"><tspan class="cyan">[server]</tspan><tspan class="t"> listening on udp/9000 (</tspan><tspan class="yellow">encrypted + psk</tspan><tspan class="t">)</tspan></text>
  <text y="232" x="16"></text>
  <text y="254" x="16"><tspan class="green-bold">$ </tspan><tspan class="t">./echo_client 127.0.0.1 9000 --psk lan-party</tspan></text>
  <text y="276" x="16"><tspan class="cyan">[client]</tspan><tspan class="t"> connecting to 127.0.0.1:9000 (</tspan><tspan class="yellow">encrypted + psk</tspan><tspan class="t">)</tspan></text>
  <text y="298" x="16"><tspan class="cyan">[client]</tspan><tspan class="t"> session up -- type a line and see it echoed</tspan></text>
  <text y="320" x="16"><tspan class="cyan">[server]</tspan><tspan class="t"> peer connected</tspan></text>
  <text y="342" x="16"><tspan class="t">hello over an encrypted datagram</tspan></text>
  <text y="364" x="16"><tspan class="blue-bold">[echo]</tspan><tspan class="t"> hello over an encrypted datagram</tspan></text>
  <text y="386" x="16"><tspan class="t">grid up at 5 Hz</tspan></text>
  <text y="408" x="16"><tspan class="blue-bold">[echo]</tspan><tspan class="t"> grid up at 5 Hz</tspan></text>
  <text y="430" x="16"><tspan class="t">^C</tspan></text>
</svg>
