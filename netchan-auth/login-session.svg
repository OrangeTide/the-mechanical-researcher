<svg xmlns="http://www.w3.org/2000/svg" width="860" height="518">
  <style>
    text { font-family: ui-monospace, 'SF Mono', 'Cascadia Code', Menlo, Consolas, monospace; font-size: 13px; white-space: pre; }
    .bg { fill: #1e1e2e; }
    .titlebar { fill: #313244; }
    .title { fill: #cdd6f4; }
    .t { fill: #cdd6f4; }
    .bold { fill: #cdd6f4; font-weight: bold; }
    .red { fill: #f38ba8; }
    .red-bold { fill: #f38ba8; font-weight: bold; }
    .green { fill: #a6e3a1; }
    .green-bold { fill: #a6e3a1; font-weight: bold; }
    .yellow { fill: #f9e2af; }
    .yellow-bold { fill: #f9e2af; font-weight: bold; }
    .blue { fill: #89b4fa; }
    .blue-bold { fill: #89b4fa; font-weight: bold; }
    .magenta { fill: #cba6f7; }
    .magenta-bold { fill: #cba6f7; font-weight: bold; }
    .cyan { fill: #94e2d5; }
    .cyan-bold { fill: #94e2d5; font-weight: bold; }
  </style>
  <rect class="bg" width="860" height="518" rx="8"/>
  <rect class="titlebar" width="860" height="32" rx="8"/>
  <rect class="bg" x="0" y="24" width="860" height="8"/>
  <circle cx="20" cy="16" r="6" fill="#f38ba8"/>
  <circle cx="40" cy="16" r="6" fill="#f9e2af"/>
  <circle cx="60" cy="16" r="6" fill="#a6e3a1"/>
  <text class="title" x="80" y="20">netchan-auth: first login</text>
  <text y="56" x="16"><tspan class="green-bold">$</tspan><tspan class="t"> nc_keygen -f id_netchan -N ""</tspan></text>
  <text y="78" x="16"><tspan class="t">wrote id_netchan (unencrypted)</tspan></text>
  <text y="100" x="16"><tspan class="t">add this line to the server's authorized_keys:</tspan></text>
  <text y="122" x="16"><tspan class="t">    &lt;username&gt; ae3fddb645dd74c77521a8ef02e38fdb06172bc3ecb3bd780586f44b6539ea03</tspan></text>
  <text y="144" x="16"></text>
  <text y="166" x="16"><tspan class="green-bold">$</tspan><tspan class="t"> echo "alice ${PK}" &gt; authorized_keys</tspan></text>
  <text y="188" x="16"></text>
  <text y="210" x="16"><tspan class="green-bold">$</tspan><tspan class="t"> auth_server --port 9000            # other terminal</tspan></text>
  <text y="232" x="16"><tspan class="t">  listening on udp/9000</tspan></text>
  <text y="254" x="16"><tspan class="t">  host key b981ee5fb8be868d3d25809f2cb5361bfef580e1e4cad40610469bfbbad38439</tspan></text>
  <text y="276" x="16"></text>
  <text y="298" x="16"><tspan class="green-bold">$</tspan><tspan class="t"> auth_client --port 9000 --user alice</tspan></text>
  <text y="320" x="16"><tspan class="t">connecting to 127.0.0.1:9000 as alice</tspan></text>
  <text y="342" x="16"><tspan class="t">* unknown host 127.0.0.1, key b981ee5fb8be868d3d25809f2cb5361bfef580e1e4cad40610469bfbbad38439</tspan></text>
  <text y="364" x="16"><tspan class="t">* permanently added to known_hosts</tspan></text>
  <text y="386" x="16"><tspan class="t">* authenticated as alice, type to echo</tspan></text>
  <text y="408" x="16"><tspan class="t">netchan&gt; the quick brown fox</tspan></text>
  <text y="430" x="16"><tspan class="t">[echo] the quick brown fox</tspan></text>
  <text y="452" x="16"><tspan class="t">netchan&gt; jumps over the lazy dog</tspan></text>
  <text y="474" x="16"><tspan class="t">[echo] jumps over the lazy dog</tspan></text>
  <text y="496" x="16"><tspan class="t">netchan&gt; </tspan></text>
</svg>
